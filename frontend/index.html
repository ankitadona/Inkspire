<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkspire</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&family=Caveat&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

<div class="auth-card">

    <h1 class="title">Inkspire 📖</h1>
    <p class="subtitle">Ink your thoughts, color your memories</p>

    <div class="form">

        <input id="name" type="text" placeholder="Name">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password" minlength="8" required>

        <div class="btns">
            <button id="signupBtn">Sign Up</button>
            <button id="loginBtn">Login</button>
        </div>

    </div>

</div>
<script src="config.js"></script>
<script src="auth.js"></script>

</body>
</html>
